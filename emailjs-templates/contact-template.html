<div style="font-family: system-ui, sans-serif, Arial; font-size: 12px">
  <div>A new contact form message has been received from <strong>{{from_name}}</strong>. Kindly respond at your earliest convenience.</div>
  <div
    style="
      margin-top: 20px;
      padding: 15px 0;
      border-width: 1px 0;
      border-style: dashed;
      border-color: lightgrey;
    "
  >
    <table role="presentation">
      <tr>
        <td style="vertical-align: top">
          <div
            style="
              padding: 6px 10px;
              margin: 0 10px;
              background-color: aliceblue;
              border-radius: 5px;
              font-size: 26px;
            "
            role="img"
          >
            ✉️
          </div>
        </td>
        <td style="vertical-align: top">
          <div style="color: #2c3e50; font-size: 16px">
            <strong>{{from_name}}</strong>
          </div>
          <div style="color: #cccccc; font-size: 13px">{{submission_date}}</div>

          <p style="font-size: 14px; margin: 10px 0 2px 0"><strong>Contact Details</strong></p>
          <p style="font-size: 13px; margin: 2px 0">Email: {{from_email}}</p>
          <p style="font-size: 13px; margin: 2px 0">Phone: {{phone}}</p>

          <p style="font-size: 14px; margin: 10px 0 2px 0"><strong>Message</strong></p>
          <p style="font-size: 13px; margin: 2px 0; white-space: pre-wrap;">{{message}}</p>
        </td>
      </tr>
    </table>
  </div>
</div>
